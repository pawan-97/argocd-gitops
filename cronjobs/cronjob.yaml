---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cronjob-third
  namespace: cron-jobs
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid # Skip new job if previous still running
  # Options:
  # - Allow: Multiple Jobs can run simultaneously [ Default ]
  # - Forbid: Skip new Job if previous still running
  # - Replace: Cancel running Job, start new one
  successfulJobsHistoryLimit: 1  # Default: 3
  failedJobsHistoryLimit: 1
  activeDeadlineSeconds: 60 # Must start within 60 seconds
  backoffLimit: 2
  suspend: false   # No new Jobs will be created
  timeZone: "Asia/Kolkata"    # Run in specific timezone
  jobTemplate:
    spec:
      # ttlSecondsAfterFinished: 86400  # Auto-delete Job after 24h
      template:
        spec:
          containers:
          - name: third
            image: busybox
            command:
              - /bin/sh
              - -c
              - date; echo "Hello from GitOps CronJob"
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
          restartPolicy: OnFailure