apiVersion: batch/v1
kind: CronJob
metadata:
  name: ordered-cron-demo
  namespace: cron-jobs
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  suspend: true

  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure

          initContainers:
            - name: job-a
              image: busybox
              command:
                - /bin/sh
                - -c
                - |
                  echo "===== I AM FIRST JOB (JOB-A) ====="
                  date
                  SLEEP_SECONDS="$(awk 'BEGIN { srand(); print int(60 + rand() * 241) }')"
                  echo "JOB-A will run for ${SLEEP_SECONDS} seconds"
                  sleep "${SLEEP_SECONDS}"
                  echo "===== FIRST JOB COMPLETED ====="
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"

            - name: job-b
              image: busybox
              command:
                - /bin/sh
                - -c
                - |
                  echo "===== I AM SECOND JOB (JOB-B) ====="
                  date
                  SLEEP_SECONDS="$(awk 'BEGIN { srand(); print int(60 + rand() * 241) }')"
                  echo "JOB-B will run for ${SLEEP_SECONDS} seconds"
                  sleep "${SLEEP_SECONDS}"
                  echo "===== SECOND JOB COMPLETED ====="
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"

          containers:
            - name: final
              image: busybox
              command:
                - /bin/sh
                - -c
                - |
                  echo "===== I AM FINAL JOB ====="
                  date
                  SLEEP_SECONDS="$(awk 'BEGIN { srand(); print int(60 + rand() * 241) }')"
                  echo "FINAL job will run for ${SLEEP_SECONDS} seconds"
                  sleep "${SLEEP_SECONDS}"
                  echo "===== ALL JOBS COMPLETED SUCCESSFULLY ====="
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"
