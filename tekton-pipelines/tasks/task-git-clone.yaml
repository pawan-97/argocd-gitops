apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-jobs
  labels:
    app.kubernetes.io/name: git-clone
spec:
  description: >
    Clones the node-bulletin-board Node.js app from GitHub.
    Uses alpine/git to keep the image lightweight.
  params:
    - name: url
      description: Git repository URL
      type: string
      default: "https://github.com/dockersamples/node-bulletin-board.git"
    - name: revision
      description: Branch or tag to checkout
      type: string
      default: "master"
  workspaces:
    - name: source
      description: Workspace where the repo will be cloned
  results:
    - name: commit
      description: The exact commit SHA that was cloned
  steps:
    - name: clone
      image: alpine/git:2.43.0
      script: |
        #!/bin/sh
        set -e
        echo "===  Git Clone  ==="
        echo "Repo    : $(params.url)"
        echo "Branch  : $(params.revision)"
        echo ""
        git clone --depth 1 --branch $(params.revision) $(params.url) $(workspaces.source.path)
        cd $(workspaces.source.path)
        git rev-parse HEAD | tee $(results.commit.path)
        echo ""
        echo "=== Cloned files ==="
        ls -la $(workspaces.source.path)
