apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-tests
  namespace: tekton-jobs
  labels:
    app.kubernetes.io/name: run-tests
spec:
  description: >
    Runs basic smoke tests against the bulletin-board app.
    Checks that:
      - package.json exists and is valid JSON
      - server.js / app.js is present (app entry point)
      - node_modules are installed correctly
    The bulletin-board sample has no test script, so we add a real structural
    validation that would catch broken installs or missing files.
  workspaces:
    - name: source
      description: Source code with npm dependencies installed
  results:
    - name: test-status
      description: PASSED or FAILED
  steps:
    - name: validate-structure
      image: node:18-alpine
      workingDir: $(workspaces.source.path)/bulletin-board-app
      script: |
        #!/bin/sh
        set -e

        echo "=== Test Step: Structural Validation ==="
        FAILED=0

        # Check 1: package.json exists and is valid
        echo "[1/4] Checking package.json..."
        if node -e "JSON.parse(require('fs').readFileSync('package.json'))" 2>/dev/null; then
          echo "  ✔ package.json is valid JSON"
        else
          echo "  ✘ package.json is missing or invalid"
          FAILED=1
        fi

        # Check 2: Main entry point exists
        MAIN=$(node -e "console.log(require('./package.json').main || 'app.js')")
        echo "[2/4] Checking entry point: $MAIN ..."
        if [ -f "$MAIN" ]; then
          echo "  ✔ $MAIN exists"
        else
          echo "  ✘ $MAIN not found"
          FAILED=1
        fi

        # Check 3: node_modules were installed
        echo "[3/4] Checking node_modules..."
        if [ -d "node_modules" ]; then
          MOD_COUNT=$(ls node_modules | wc -l)
          echo "  ✔ node_modules present ($MOD_COUNT packages)"
        else
          echo "  ✘ node_modules directory missing — did npm install run?"
          FAILED=1
        fi

        # Check 4: No known critical vulnerability packages (basic check)
        echo "[4/4] Running npm audit (non-blocking)..."
        npm audit --audit-level=critical || true
        echo "  ✔ Audit check done"

        echo ""
        if [ "$FAILED" -eq 0 ]; then
          echo "PASSED" | tee $(results.test-status.path)
          echo "=== All checks passed! ==="
        else
          echo "FAILED" | tee $(results.test-status.path)
          echo "=== One or more checks failed! ==="
          exit 1
        fi
