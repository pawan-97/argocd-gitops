---
# Task: notify
# Sends a Slack notification at the end of the pipeline.
# Always runs via `finally:` block — regardless of pass/fail.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: notify
  namespace: tekton-jobs
  labels:
    app.kubernetes.io/name: notify
spec:
  description: >
    Sends a Slack notification summarising the pipeline result.
    Reads SLACK_WEBHOOK_URL from a Kubernetes Secret.
    Runs in the pipeline's `finally` block so it always executes.
  params:
    - name: pipeline-status
      description: "Aggregate pipeline status: Succeeded, Failed, or Cancelled"
      type: string
    - name: app-name
      description: Application name displayed in the notification
      type: string
      default: "bulletin-board"
    - name: git-commit
      description: Git commit SHA that was built
      type: string
      default: "unknown"
    - name: image-digest
      description: Docker image digest that was pushed
      type: string
      default: "unknown"
    - name: environment
      description: Target deployment environment
      type: string
      default: "production"
  steps:
    - name: send-slack
      image: curlimages/curl:8.5.0
      env:
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: slack-webhook-secret   # kubectl create secret generic slack-webhook-secret --from-literal=url=https://hooks.slack.com/...
              key: url
              optional: true              # won't fail if secret doesn't exist yet
      script: |
        #!/bin/sh
        set -e

        STATUS="$(params.pipeline-status)"
        APP="$(params.app-name)"
        COMMIT="$(params.git-commit)"
        ENV="$(params.environment)"
        DIGEST="$(params.image-digest)"

        # Emoji based on status
        if [ "$STATUS" = "Succeeded" ]; then
          EMOJI=":white_check_mark:"
          COLOR="#2eb886"
        else
          EMOJI=":x:"
          COLOR="#e01e5a"
        fi

        PAYLOAD=$(cat <<EOF
        {
          "attachments": [{
            "color": "$COLOR",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "$EMOJI $APP Pipeline: $STATUS" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Environment:*\n$ENV" },
                  { "type": "mrkdwn", "text": "*Git Commit:*\n\`$COMMIT\`" },
                  { "type": "mrkdwn", "text": "*Image Digest:*\n\`$DIGEST\`" }
                ]
              }
            ]
          }]
        }
        EOF
        )

        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          echo "Sending Slack notification..."
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
          echo ""
          echo "✔ Slack notification sent"
        else
          echo "⚠ SLACK_WEBHOOK_URL not set — skipping Slack notification"
          echo "Pipeline: $APP | Status: $STATUS | Commit: $COMMIT"
        fi
