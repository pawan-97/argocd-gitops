apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build
  namespace: tekton-jobs
  labels:
    app.kubernetes.io/name: build
spec:
  description: >
    Runs `npm install` to install dependencies for the node-bulletin-board app.
    Uses node:18-alpine for a small, production-appropriate image.
  workspaces:
    - name: source
      description: Cloned source code
  results:
    - name: node-version
      description: Node.js version used during build
  steps:
    - name: npm-install
      image: node:18-alpine
      workingDir: $(workspaces.source.path)/bulletin-board-app
      script: |
        #!/bin/sh
        set -e

        echo "=== Build Step: npm install ==="
        echo "Node version:"
        node --version | tee $(results.node-version.path)
        echo "NPM version: $(npm --version)"
        echo ""

        echo "Installing dependencies..."
        npm install --prefer-offline --no-audit
        echo ""

        echo "=== Installed packages ==="
        npm list --depth=0
