---
# Task: docker-build-push
# Builds the bulletin-board Docker image using Kaniko (no Docker daemon needed in k8s)
# and pushes it to Docker Hub (or any registry).
#
# Kaniko is the standard Tekton way to build images inside a Pod without
# privileged access — safe to run in any k8s cluster.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: docker-build-push
  namespace: tekton-jobs
  labels:
    app.kubernetes.io/name: docker-build-push
spec:
  description: >
    Builds the bulletin-board Docker image using Kaniko and pushes it to a registry.
    Requires a Kubernetes Secret named `docker-registry-creds` with registry credentials
    mounted as /kaniko/.docker/config.json.
  params:
    - name: image
      description: Full image name to push (e.g. docker.io/myorg/bulletin-board)
      type: string
      default: "docker.io/myorg/bulletin-board"
    - name: tag
      description: Image tag
      type: string
      default: "latest"
    - name: dockerfile-path
      description: Path to the Dockerfile within the workspace
      type: string
      default: "bulletin-board-app/Dockerfile"
    - name: context-path
      description: Build context path within the workspace
      type: string
      default: "bulletin-board-app"
  workspaces:
    - name: source
      description: Source code workspace containing the Dockerfile
    - name: docker-config
      description: Workspace containing Docker credentials (config.json)
  results:
    - name: image-digest
      description: SHA digest of the pushed image
  steps:
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.21.0
      args:
        - --dockerfile=$(workspaces.source.path)/$(params.dockerfile-path)
        - --context=$(workspaces.source.path)/$(params.context-path)
        - --destination=$(params.image):$(params.tag)
        - --destination=$(params.image):$(tasks.checkout.results.commit)  # also tag with git SHA
        - --digest-file=$(results.image-digest.path)
        - --cache=true
        - --cache-ttl=24h
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.docker-config.path)
