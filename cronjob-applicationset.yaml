apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cronjobs-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pawan-97/argocd-gitops.git
    targetRevision: master
    path: cronjobs

  destination:
    server: https://kubernetes.default.svc
    namespace: cron-jobs

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
        - CreateNamespace=true
